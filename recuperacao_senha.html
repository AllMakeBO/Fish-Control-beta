<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperação de Senha - FishControl</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="top-bar">
    <a href="#" class="logo">
      <img src="https://uploads.onecompiler.io/43s2gpp6m/43vnc6kjz/Logotipo%20360x360.png" alt="Logo FishControl">
    </a>
    <h1>FishControl</h1>
  </header>

  <div class="verify_content">
    <h2>Verificar identidade</h2>
    
    <div id="step-1">
      <div class="verification-option">
        <label>
          <input type="radio" name="verify_method" checked>
          Email usu********@gmail.com
        </label>
      </div>

      <p class="instrucoes">
        Para verificar se esse é o seu endereço de email, preencha a parte oculta e clique em "Obter código" para receber o seu código.
      </p>

      <form id="form-email">
        <div class="input-group">
          <input type="email" placeholder="Parte oculta do email" required>
          <span class="domain">@gmail.com</span>
        </div>
        <button type="submit">Obter código</button>
      </form>
    </div>

    <div id="step-2" style="display: none;">
      <p class="instrucoes">
        Enviamos um código de verificação para o seu email. Por favor, insira-o abaixo:
      </p>
      
      <form id="form-codigo">
        <div class="input-codigo-container">
          <input type="text" class="input-codigo" placeholder="Digite o código" required>
        </div>
        <button type="submit">Verificar código</button>
      </form>
    </div>
    
    <div class="links-footer">
      <a href="index.html">Voltar para o Login</a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
